apiVersion: apps/v1
kind: Deployment
metadata:
  name: stultus
  labels:
    app: stultus
spec:
  replicas: 6
  selector:
    matchLabels:
      app: stultus
  template:
    metadata:
      labels:
        app: stultus
    spec:
      containers:
        - name: stultus
          #image: docker.io/ilikecontainers/stultus:1.0.0
          image: db01:5000/stultus:latest # Chud indexing nodes can't reach the internet, db01 is now a registry
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
            - name: SCRAPER_PROXY
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: SCRAPER_PROXY
