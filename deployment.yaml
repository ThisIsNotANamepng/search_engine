apiVersion: apps/v1
kind: Deployment
metadata:
  name: stultus
  labels:
    app: stultus
spec:
  replicas: 6
  selector:
    matchLabels:
      app: stultus
  template:
    metadata:
      labels:
        app: stultus
    spec:
      containers:
        - name: stultus
          image: ilikecontainers/stultus_scraper:1.0.0
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
            - name: SCRAPER_PROXY
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DATABASE_URL
